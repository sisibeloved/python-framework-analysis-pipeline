schemaVersion: 1
framework: pyflink
mode: plan-only

# 单机 Docker 集群模式：每台物理机运行 1JM + 2TM 容器
# client/jm/tm 角色在同一台机器上用 Docker network 通信
# 宿主机只需要 Docker，Java/Python/Flink 全部在容器内

platforms:
  - id: arm
    arch: aarch64
    hosts:
      - role: client
        hostRef: kunpeng
      - role: jobmanager
        hostRef: kunpeng
      - role: taskmanager
        hostRef: kunpeng

  - id: x86
    arch: x86_64
    hosts:
      - role: client
        hostRef: zen5
      - role: jobmanager
        hostRef: zen5
      - role: taskmanager
        hostRef: zen5

software:
  flinkImage: flink:1.20.1-java17
  dockerRequired: true
  clusterTopology: 1jm-2tm
  containerNetwork: flink-network

hostRefs:
  kunpeng:
    connect: ssh
    alias: kunpeng
    capabilities:
      ssh: true
      sudo: true
      docker: true
      internet: true
      upload: true
      download: true

  zen5:
    connect: ssh
    alias: zen5
    capabilities:
      ssh: true
      sudo: true
      docker: true
      internet: true
      upload: true
      download: true
